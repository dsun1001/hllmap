version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - aws s3 sync dist/ s3://hllmap.com --delete
      - find dist -type f ! -name "*.*" -print
      - |
        find dist -type f ! -name "*.*" -exec sh -c '
          for file do
            key="${file#dist/}"
            aws s3 cp "$file" "s3://hllmap.com/$key" \
              --content-type "text/html; charset=utf-8" \
              --metadata-directive REPLACE
          done
        ' sh {} +

artifacts:
  base-directory: dist
  files:
    - "**/*"
